name: Deprecation Guard

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 0 * * 1'

jobs:
  deprecation-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ hashFiles('**/package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Flutter
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve Flutter dependencies
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        run: flutter pub get

      - name: Run Deprecation Health Check
        run: ./scripts/check_deprecation_health.sh

